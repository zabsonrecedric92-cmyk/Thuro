<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@gura App</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
.header{
  background:#000;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* MENU */
.menu{
  display:flex;
  justify-content:space-around;
  background:#1a1a1a;
  padding:10px;
}

.menu button{
  background:none;
  border:none;
  color:white;
  font-size:14px;
}

/* PAGES */
.section{
  display:none;
  padding:15px;
}

.active{
  display:block;
}

/* CARDS */
.card{
  background:#1f1f1f;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
}

/* CHAT */
.chat-box{
  height:250px;
  overflow-y:auto;
  background:#222;
  padding:10px;
  border-radius:10px;
}

input{
  width:70%;
  padding:10px;
}

button.send{
  padding:10px;
  background:red;
  border:none;
  color:white;
}
</style>

</head>

<body>

<div class="header">@gura 📱</div>

<div class="menu">
  <button onclick="show('home')">🏠</button>
  <button onclick="show('videos')">🎥</button>
  <button onclick="show('chat')">💬</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="card">
    <h2>👋 Bienvenue</h2>
    <p>Ton site devient une vraie application 🔥</p>
  </div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
  <div class="card">
    <h2>🔥 Vidéo du jour</h2>
    <iframe width="100%" height="200"
    src="https://www.youtube.com/embed/dQw4w9WgXcQ"
    frameborder="0"></iframe>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="section">
  <div class="card">
    <h2>💬 Chat</h2>

    <div class="chat-box" id="box"></div>

    <input id="msg" placeholder="message...">
    <button class="send" onclick="send()">Envoyer</button>
  </div>
</div>

<script>
function show(page){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

function send(){
  let msg = document.getElementById("msg").value;
  if(msg === "") return;

  document.getElementById("box").innerHTML +=
    "<p>👤 " + msg + "</p>";

  document.getElementById("msg").value = "";
}
</script>

</body>
</html>
